<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GTO Preflop Charts</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div id="app">
        <div class="main-layout">
            <!-- Left Control Panel -->
            <div class="control-panel">
                <div class="control-group chart-mode-group">
                    <div class="control-label">CHART MODE</div>
                    <div class="button-group" id="chartModeButtons"></div>
                </div>

                <div class="control-row">
                    <div class="control-group">
                        <div class="control-label">GAME TYPE</div>
                        <div class="button-group" id="gameTypeButtons"></div>
                    </div>
                    <div class="control-group">
                        <div class="control-label">FORMAT</div>
                        <div class="button-group" id="formatButtons"></div>
                    </div>
                </div>

                <div class="control-group" id="stackSizeGroup">
                    <div class="control-label">STACK SIZE</div>
                    <div class="button-group" id="stackSizeButtons"></div>
                </div>

                <div class="control-group">
                    <div class="control-label">HERO SEAT</div>
                    <div class="button-group" id="heroSeatButtons"></div>
                </div>

                <div class="control-group">
                    <div class="control-label">PREFLOP ACTION</div>
                    <div class="button-group" id="actionButtons"></div>
                </div>

                <div class="control-group">
                    <div class="control-label">OPPONENT SEAT</div>
                    <div class="button-group" id="opponentSeatButtons"></div>
                </div>
            </div>

            <!-- Right Side: Grid and Stats -->
            <div class="grid-panel">
                <div class="info-bar" id="infoBar">Select options to view a chart</div>

                <div class="grid-container" id="handGrid"></div>

                <div class="stats-bar" id="statsBar"></div>
                <div class="stats-progress" id="statsProgress"></div>
            </div>
        </div>
    </div>

    <script src="charts.js"></script>
    <script src="preset-data.js"></script>
    <script src="gto-mixed-data.js"></script>
    <script src="app.js"></script>
</body>
</html>
